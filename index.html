<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual Timer - Al Brooks Edition</title>
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      --bg-color: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-main: #ffffff;
      --accent: #00f2fe;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      background-image:
        radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.15) 0px, transparent 50%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      padding: 20px;
    }

    .main-wrapper {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    .container {
      width: 100%;
      max-width: 380px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 0.9rem;
      font-weight: 400;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .display {
      font-size: 5rem;
      font-weight: 800;
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }

    .input-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 15px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
    }

    input[type="number"] {
      background: transparent;
      border: none;
      color: white;
      width: 60px;
      font-size: 1.2rem;
      text-align: right;
      outline: none;
    }

    .loop-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: var(--primary-gradient);
      color: #000;
      grid-column: span 2;
    }

    .btn-stop,
    .btn-reset {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.2);
    }

    .audio-status {
      font-size: 0.7rem;
      margin-top: 5px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="main-wrapper">

    <div class="container">
      <div class="glass-card">
        <h1>Timer 01</h1>
        <div class="display" id="display1">00:00</div>
        <div class="settings">
          <div class="input-row">
            <label>Minutos</label>
            <input type="number" id="minutesInput1" value="2" min="1">
          </div>
          <label class="loop-box">
            <input type="checkbox" id="loopCheck1"> Modo Loop
          </label>
          <div class="audio-status">🔊 Som: ding.mp3</div>
        </div>
        <div class="controls">
          <button class="btn-start" id="startBtn1">Iniciar 01</button>
          <button class="btn-stop" id="stopBtn1">Pausar</button>
          <button class="btn-reset" id="resetBtn1">Resetar</button>
        </div>
      </div>
      <audio id="alarmAudio1" src="som/ding.mp3"></audio>
    </div>

    <div class="container">
      <div class="glass-card">
        <h1>Timer 02</h1>
        <div class="display" id="display2">00:00</div>
        <div class="settings">
          <div class="input-row">
            <label>Minutos</label>
            <input type="number" id="minutesInput2" value="5" min="1">
          </div>
          <label class="loop-box">
            <input type="checkbox" id="loopCheck2"> Modo Loop
          </label>
          <div class="audio-status">🔊 Som: notification.mp3</div>
        </div>
        <div class="controls">
          <button class="btn-start" id="startBtn2">Iniciar 02</button>
          <button class="btn-stop" id="stopBtn2">Pausar</button>
          <button class="btn-reset" id="resetBtn2">Resetar</button>
        </div>
      </div>
      <audio id="alarmAudio2" src="som/notification.mp3"></audio>
    </div>

  </div>

  <script>
    function createTimer(idSuffix) {
      let countdown;
      let timeLeft;
      let running = false;

      const elements = {
        display: document.getElementById('display' + idSuffix),
        minutesInput: document.getElementById('minutesInput' + idSuffix),
        loopCheck: document.getElementById('loopCheck' + idSuffix),
        alarmAudio: document.getElementById('alarmAudio' + idSuffix),
        startBtn: document.getElementById('startBtn' + idSuffix),
        stopBtn: document.getElementById('stopBtn' + idSuffix),
        resetBtn: document.getElementById('resetBtn' + idSuffix)
      };

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }

      function updateDisplay() {
        elements.display.textContent = formatTime(timeLeft);
      }

      function playAlarm() {
        elements.alarmAudio.currentTime = 0;
        elements.alarmAudio.play().catch(e => {
          console.error("Erro ao tocar áudio. Certifique-se de que o arquivo está na pasta 'som' ao lado deste HTML.");
        });
      }

      function startTimer() {
        if (running) return;
        if (!timeLeft || timeLeft <= 0) timeLeft = parseInt(elements.minutesInput.value) * 60;

        running = true;
        elements.startBtn.style.opacity = "0.5";
        elements.startBtn.style.pointerEvents = "none";

        countdown = setInterval(() => {
          timeLeft--;
          updateDisplay();

          if (timeLeft <= 0) {
            playAlarm();
            if (elements.loopCheck.checked) {
              timeLeft = parseInt(elements.minutesInput.value) * 60;
              updateDisplay();
            } else {
              clearInterval(countdown);
              running = false;
              elements.startBtn.style.opacity = "1";
              elements.startBtn.style.pointerEvents = "all";
            }
          }
        }, 1000);
      }

      function stopTimer() {
        clearInterval(countdown);
        running = false;
        elements.startBtn.style.opacity = "1";
        elements.startBtn.style.pointerEvents = "all";
      }

      function resetTimer() {
        stopTimer();
        timeLeft = parseInt(elements.minutesInput.value) * 60;
        updateDisplay();
      }

      elements.startBtn.addEventListener('click', startTimer);
      elements.stopBtn.addEventListener('click', stopTimer);
      elements.resetBtn.addEventListener('click', resetTimer);
      elements.minutesInput.addEventListener('input', () => {
        if (!running) { timeLeft = parseInt(elements.minutesInput.value) * 60; updateDisplay(); }
      });

      timeLeft = parseInt(elements.minutesInput.value) * 60;
      updateDisplay();
    }

    createTimer('1');
    createTimer('2');
  </script>
</body>

</html>
